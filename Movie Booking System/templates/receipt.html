<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ticket Pass Blueprint Terminal</title>
    <style>
        :root {
            --body-bg: #07070c;
            --card-bg: #12121f;
            --border-clr: #ff3838;
            --text-clr: #ffffff;
            --sub-clr: #808095;
            --accent-bg: rgba(255, 56, 56, 0.1);
        }

        /* 🎨 MASTER VISUAL SCHEME VARIABLE SWAPPING MATRICES */
        .theme-cyberpunk {
            --body-bg: #090014;
            --card-bg: #16002c;
            --border-clr: #00ffff;
            --text-clr: #00ffff;
            --sub-clr: #ff00ff;
            --accent-bg: rgba(0, 255, 255, 0.08);
        }
        .theme-retro {
            --body-bg: #dcd3b6;
            --card-bg: #f5f0db;
            --border-clr: #704d25;
            --text-clr: #3c2415;
            --sub-clr: #6b573d;
            --accent-bg: rgba(112, 77, 37, 0.1);
        }
        .theme-manga {
            --body-bg: #dedede;
            --card-bg: #ffffff;
            --border-clr: #000000;
            --text-clr: #000000;
            --sub-clr: #555555;
            --accent-bg: rgba(0, 0, 0, 0.05);
        }
        .theme-gold {
            --body-bg: #1c180a;
            --card-bg: #2d2410;
            --border-clr: #ffb830;
            --text-clr: #ffb830;
            --sub-clr: #dac090;
            --accent-bg: rgba(255, 184, 48, 0.12);
        }

        body { background-color: var(--body-bg); color: var(--text-clr); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: all 0.4s ease; padding: 20px; }

        /* Style Swatch Bar Dashboard Controllers */
        .swatch-panel { background: #131324; padding: 12px 25px; border-radius: 30px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; border: 1px solid #23233b; box-shadow: 0 4px 15px rgba(0,0,0,0.5); color: #808095; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .swatch { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: transform 0.2s; }
        .swatch:hover { transform: scale(1.25); }

        .ticket-stub { background: var(--card-bg); color: var(--text-clr); padding: 40px; border-radius: 20px; border: 2px dashed var(--border-clr); text-align: center; max-width: 440px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.7); transition: all 0.4s ease; box-sizing: border-box; }
        .pass-header { text-transform: uppercase; letter-spacing: 3px; font-size: 13px; color: var(--sub-clr); margin-bottom: 5px; font-weight: bold; }
        .token-view { color: var(--border-clr); font-size: 20px; font-weight: 800; margin: 15px 0 25px 0; background: var(--accent-bg); padding: 10px; border-radius: 8px; letter-spacing: 1px; font-family: monospace; border: 1px solid rgba(255,255,255,0.02); }

        .field { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 15px; border-bottom: 1px dashed var(--sub-clr); padding-bottom: 8px; align-items: center; }
        .label { color: var(--sub-clr); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-weight: bold; font-size: 15px; }

        /* 📱 Interactive QR Frame Component */
        .qr-frame { background: white; padding: 15px; display: inline-block; border-radius: 12px; margin-top: 20px; cursor: pointer; transition: transform 0.3s; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .qr-frame:hover { transform: scale(1.05) rotate(1deg); }
        .qr-frame img { display: block; }
        .click-hint { font-size: 11px; color: var(--sub-clr); margin-top: 8px; display: block; font-weight: bold; letter-spacing: 0.5px; }

        /* Simulated Digital Ticket Barcode Block */
        .barcode-strip { display: flex; justify-content: center; gap: 2px; margin-top: 25px; height: 35px; opacity: 0.4; }
        .bar { background: var(--text-clr); width: 2px; height: 100%; }
        .bar.thick { width: 5px; }
        .bar.mid { width: 3.5px; }

        .dashboard-btn { display: block; background: var(--border-clr); color: #ffffff; text-decoration: none; padding: 14px; border-radius: 8px; margin-top: 30px; font-weight: bold; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.2s; box-shadow: 0 4px 15px var(--accent-bg); }
        .dashboard-btn:hover { opacity: 0.9; }

        .zoom-backdrop { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 999; cursor: zoom-out; }
        .zoom-frame { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .zoom-frame img { width: 340px; height: 340px; display: block; }
    </style>
</head>
<body id="receiptLayoutBody">

    <!-- Active Vector Sheet Theme Picker UI Swatches -->
    <div class="swatch-panel">
        <span>🎨 Ticket Mesh Shader:</span>
        <div class="swatch" style="background: #11111f;" onclick="swapStubSkin('default')"></div>
        <div class="swatch" style="background: #16002c; border-color: #00ffff;" onclick="swapStubSkin('cyberpunk')"></div>
        <div class="swatch" style="background: #f5f0db; border-color: #704d25;" onclick="swapStubSkin('retro')"></div>
        <div class="swatch" style="background: #ffffff; border-color: #000000;" onclick="swapStubSkin('manga')"></div>
        <div class="swatch" style="background: #2d2410; border-color: #ffb830;" onclick="swapStubSkin('gold')"></div>
    </div>

    <div class="ticket-stub">
        <div class="pass-header">Official Gate Boarding Pass</div>
        <div class="token-view">{{ b.booking_token }}</div>

        <div class="field"><span class="label">Feature Title:</span><span class="value">{{ b.movie_title }}</span></div>
        <div class="field"><span class="label">Timeline Slot:</span><span class="value">{{ b.show_time }}</span></div>
        <div class="field"><span class="label">Allocated Slots:</span><span class="value" style="color:var(--border-clr);">#{{ b.seats_list }}</span></div>
        <div class="field"><span class="label">Aggregated Cost:</span><span class="value" style="font-family:monospace; font-size:16px;">₹{{ b.total_price }}</span></div>

        <div class="qr-frame" onclick="openPassportZoom()">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=VALID_TICKET_{{ b.booking_token }}" alt="QR Security Pass">
            <span class="click-hint">🔍 Expand Auth Token</span>
        </div>

        <!-- Simulated Barcode Matrix Graphics Row -->
        <div class="barcode-strip">
            <div class="bar thick"></div><div class="bar"></div><div class="bar mid"></div><div class="bar"></div><div class="bar thick"></div><div class="bar mid"></div><div class="bar"></div><div class="bar thick"></div><div class="bar"></div><div class="bar mid"></div><div class="bar thick"></div><div class="bar"></div><div class="bar mid"></div>
        </div>

        <a href="/" class="dashboard-btn" style="color: white !important;">Return to Command Terminal</a>
    </div>

    <div class="zoom-backdrop" id="passportLightbox" onclick="closePassportZoom()">
        <div class="zoom-frame" onclick="event.stopPropagation()">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=VALID_TICKET_{{ b.booking_token }}" alt="Expanded Passport">
        </div>
    </div>

    <script>
        function openPassportZoom() { document.getElementById('passportLightbox').style.display = 'flex'; }
        function closePassportZoom() { document.getElementById('passportLightbox').style.display = 'none'; }

        function swapStubSkin(skinName) {
            const body = document.getElementById('receiptLayoutBody');
            body.className = "";
            if(skinName !== 'default') {
                body.classList.add('theme-' + skinName);
            }
        }
    </script>
</body>
</html>
