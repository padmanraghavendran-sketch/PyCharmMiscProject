<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to BookMyMovie</title>
    <style>
        body {
            background-color: #0d0d13;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: #151522;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #1f1f2e;
        }
        .brand-logo {
            text-align: center;
            color: #ff3838;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h2 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 20px;
            color: #e2e2e2;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #a0a0b0;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            background: #252538;
            border: 1px solid #35354a;
            color: white;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }
        .form-input:focus {
            border-color: #ff3838;
        }
        .auth-btn {
            width: 100%;
            background: #ff3838;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-btn:hover {
            background: #e02424;
        }
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #a0a0b0;
        }
        .toggle-link {
            color: #ff3838;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        .flash-msg {
            background: #ff3838;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-logo">🍿 BookMyMovie</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash-msg">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div id="loginBox">
            <h2>Sign In to Your Account</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Gmail Address</label>
                    <input type="email" name="email" class="form-input" required placeholder="name@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Log In</button>
            </form>
            <div class="toggle-text">
                Don't have an account? <span class="toggle-link" onclick="switchForm()">Sign Up</span>
            </div>
        </div>

        <div id="signupBox" style="display: none;">
            <h2>Create New Account</h2>
            <form action="/signup" method="POST">
                <div class="form-group">
                    <label>Gmail Address</label>
                    <input type="email" name="email" class="form-input" required placeholder="name@gmail.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" class="form-input" required placeholder="10-digit number" maxlength="10">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Register</button>
            </form>
            <div class="toggle-text">
                Already have an account? <span class="toggle-link" onclick="switchForm()">Log In</span>
            </div>
        </div>
    </div>

    <script>
        function switchForm() {
            const login = document.getElementById('loginBox');
            const signup = document.getElementById('signupBox');
            if (login.style.display === 'none') {
                login.style.display = 'block';
                signup.style.display = 'none';
            } else {
                login.style.display = 'none';
                signup.style.display = 'block';
            }
        }
    </script>
</body>
</html>
